<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <script
      src="https://kit.fontawesome.com/83627fab57.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="src/style.css" />
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  </head>
  <body>
    <section>
      <div class="container">
        <div class="row">
          <div class="col-sm-6">
            <h1 class="city">Riga</h1>
            <i class="far fa-snowflake heading"></i>
          </div>

          <div class="col-sm-6">
            <h3 id="#temperature">10℃</h3>
            <h3 class="speed">Wind speed: 5 km/h</h3>
            <h3 class="humidity">Humidity: 45%</h3>
          </div>
        </div>
      </div>

      <h2 class="date">Wednesday 10:59</h2>
      <div class="container">
        <form id="searchcity" style="text-align: center; margin: 0 auto">
          <div class="mb-3">
            <br />
            <label for="search">
              <input
                id="search-Bar"
                type="text"
                class="form-control"
                placeholder="Search city"
                aria-label="search"
                aria-describedby="search bar"
              />
            </label>

            <button
              class="btn btn-outline-secondary listener"
              type="submit"
              id="button-addon2"
            >
              <i class="fas fa-search searchi"></i>
            </button>
          </div>
          <button class="location" id="location">Current Location</button>
        </form>
        <br />
      </div>
      <div class="container">
        <div class="card-group">
          <div class="card" style="width: 20rem; background-color: #5a3d5c">
            <div class="card-body">
              <h5 class="card-title">Mon</h5>
              <p class="card-text">5℃</p>
              <p class="card-text">
                <small class="text-muted">
                  <i class="far fa-snowflake"></i>
                </small>
              </p>
            </div>
          </div>
          <div class="card" style="width: 20rem; background-color: #5a3d5c">
            <div class="card-body">
              <h5 class="card-title">Tue</h5>
              <p class="card-text">5℃</p>
              <p class="card-text">
                <small class="text-muted">
                  <i class="far fa-snowflake"></i>
                </small>
              </p>
            </div>
          </div>
          <div class="card" style="width: 20rem; background-color: #5a3d5c">
            <div class="card-body">
              <h5 class="card-title">Wed</h5>
              <p class="card-text">5℃</p>
              <p class="card-text">
                <small class="text-muted">
                  <i class="far fa-snowflake"></i>
                </small>
              </p>
            </div>
          </div>
          <div class="card" style="width: 20rem; background-color: #5a3d5c">
            <div class="card-body">
              <h5 class="card-title">Thu</h5>
              <p class="card-text">5℃</p>
              <p class="card-text">
                <small class="text-muted">
                  <i class="far fa-snowflake"></i>
                </small>
              </p>
            </div>
          </div>
          <div class="card" style="width: 20rem; background-color: #5a3d5c">
            <div class="card-body">
              <h5 class="card-title">Fri</h5>
              <p class="card-text">5℃</p>
              <p class="card-text">
                <small class="text-muted">
                  <i class="far fa-snowflake"></i>
                </small>
              </p>
            </div>
          </div>
        </div>
      </div>
      <br />
      <br />
      <br />
      <a href="https://github.com/kusinicevaa/Weather-App">
        Open source by Arina K
      </a>
    </section>
    <script src="src/script.js"></script>
  </body>
</html>
